format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan"
format = "[$path]($style)"
read_only = " 󰌾"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[git_branch]
symbol = "󰘬 "
format = " [│](dimmed white) [$symbol$branch]($style)"
style = "purple"

[git_status]
format = "( [$ahead_behind]($style))"
style = "cyan"
ahead = "󰁝$count"
diverged = "󰁝$ahead_count󰁅$behind_count"
behind = "󰁅$count"

[git_metrics]
disabled = false
format = "( [│](dimmed white)( [+$added]($added_style))( [-$deleted]($deleted_style)))"
added_style = "bold green"
deleted_style = "bold red"
