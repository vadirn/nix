# lazyworktree config — managed by nix (home/lazyworktree-config.yaml,
# symlinked to ~/.config/lazyworktree/config.yaml). Edits here take effect
# immediately; no rebuild needed (mkOutOfStoreSymlink).
# Full reference: https://github.com/chmouel/lazyworktree/blob/main/config.example.yaml

# Never run commands from per-worktree .wt files. Worktree setup stays a
# deliberate, manual act, consistent with gating commit, PR, and push by hand.
# Set to "tofu" to allow them behind a trust-on-first-use prompt instead.
trust_mode: "never"

# Where new worktrees are created. Default layout: ~/.local/share/worktrees/<org>-<repo>.
# lazyworktree reports the chosen path back to the `lw` shell helper via
# --output-selection, so moving this root needs no change to `lw`.
# To keep worktrees inside each repo instead: worktree_dir: $LWT_REPO_PATH/.worktrees
worktree_dir: ~/.local/share/worktrees

# Sort the worktree list by when you last switched to each.
sort_mode: switched

# Refresh git metadata in the background; pull CI status only on demand to stay
# off the GitHub API rate limit.
auto_refresh: true
ci_auto_refresh: false

# Theme is chosen at runtime by the `lw` shell function to follow the macOS
# light/dark setting: catppuccin-mocha (dark) / catppuccin-latte (light),
# mirroring how `lg` switches lazygit. Left empty here so a bare `lazyworktree`
# invocation auto-detects from the terminal background instead.
theme: ""
