name: writing-en-fast-bench

defaults:
  model: claude-sonnet-4-20250514
  image: claude-runner-writing-en
  max_rounds: 1
  wait: 10
  resolve_questions: false

steps:
  - name: bench
    prompt: |
      You are benchmarking the writing-en skill in single-pass mode.
      Read the eval cases from home/claude/evals/writing-en/evals.json.

      For each eval case:
      1. Read the "input" field.
      2. Record the start time.
      3. Edit the text in ONE pass, applying ALL of these rules simultaneously:

         WORDS: Replace nominalizations (-tion, -ment, -ance) with verbs.
         Replace long words with short equivalents (utilize→use, facilitate→help,
         approximately→about, commence→start, subsequently→then, sufficient→enough,
         terminate→end, prior to→before). Cut filler (due to the fact that→because,
         in the event that→if, it is important to note that→cut, each and every→every).
         Replace negatives with affirmatives (not uncommon→common, not easy→hard).
         Replace dead metaphors with concrete meaning (think outside the box, move the needle,
         low-hanging fruit).

         SENTENCES: Make the actor the subject. Use active voice. Get to the main verb
         within 7 words. Open with familiar, close with new.

         PARAGRAPHS: Lead with the main point. One topic per paragraph.

         AI PATTERNS: Cut filler openings (Here's how, In this section, It is worth noting).
         Replace promotional adjectives (innovative, cutting-edge, robust, groundbreaking,
         seamless, comprehensive, powerful, unprecedented, transformative, empowering)
         with facts or cut them. Remove redundant connectives (Furthermore, Additionally,
         Moreover). Vary sentence length.

      4. Record the end time.
      5. Save the edited text to home/claude/evals/writing-en/outputs/{id}.md
         Save ONLY the edited text, no commentary or explanation.
      6. Save timing to home/claude/evals/writing-en/outputs/{id}.meta.json:
         {"elapsed_seconds": <seconds as float>}

      Use the bench skill for measuring elapsed time per case.
      Process all 13 eval cases. Overwrite any existing output files.
      Create the outputs/ directory if needed.
    accept: |
      - All 8 output files exist in home/claude/evals/writing-en/outputs/
      - All 8 meta.json files exist with elapsed_seconds
      - Each output file contains only the edited text
    skills: [bench]
    verify: |
      cd /workspace && python3 home/claude/evals/writing-en/grade.py
    on_fail: retry
    max_retries: 1
