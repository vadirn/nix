name: writing-ru-bench

skills: [bench]

defaults:
  model: claude-sonnet-4-20250514
  max_rounds: 1

steps:
  - name: bench
    prompt: |
      Ты тестируешь навык writing-ru. Прочитай eval-кейсы из
      home/claude/evals/writing-ru/evals.json.

      Для каждого кейса:
      1. Прочитай поле "input" — это текст для редактирования.
      2. Засеки время начала.
      3. Отредактируй текст за ОДИН проход, применяя ВСЕ правила одновременно:

         СЛОВА: Замени отглагольные существительные (-ание, -ение, -ция) глаголами.
         Замени канцеляризмы живым языком (в рамках данного→в этом, ввиду отсутствия→так как нет,
         имело место быть→есть, вышеуказанный→этот, в связи с тем что→так как,
         при условии что→если, в целях обеспечения→чтобы, на сегодняшний день→сейчас).
         Убери мусор (следует отметить, ни для кого не секрет, в принципе, достаточно,
         как уже было сказано выше). Замени отрицания утверждениями (не забудьте→сохраните,
         нельзя не отметить→стоит отметить, не является невозможным→возможно).
         Убери конструкции «осуществить/произвести/выполнить + существительное» → глагол.

         ПРЕДЛОЖЕНИЯ: Активный залог вместо пассивного. Разверни причастные обороты
         длиннее 4 слов. Одна мысль на предложение, цель 15-25 слов.

         АБЗАЦЫ: Главное первым. Один абзац — одна мысль.

         AI-ПАТТЕРНЫ: Убери маркеры (В современном мире, Важно отметить, Давайте разберёмся,
         Таким образом, В заключение). Замени рекламные штампы конкретикой (широкий ассортимент,
         индивидуальный подход, высокое качество, инновационный, идеальное решение,
         ряд преимуществ, широкий спектр). Убери лишние связки (Кроме того, Также,
         В заключение). Чередуй длину предложений.

      4. Засеки время окончания.
      5. Сохрани отредактированный текст в home/claude/evals/writing-ru/outputs/{id}.md
         Сохраняй ТОЛЬКО отредактированный текст, без комментариев.
      6. Сохрани время в home/claude/evals/writing-ru/outputs/{id}.meta.json:
         {"elapsed_seconds": <секунды как float>}

      Используй навык bench для измерения времени.
      Обработай все 10 кейсов. Перезаписывай существующие файлы.
      Создай директорию outputs/ если нужно.
    review: |
      Run: python3 home/claude/evals/writing-ru/grade.py
      Report pass/fail per assertion and overall score.
