name: writing-en-bench

defaults:
  model: claude-sonnet-4-20250514
  image: claude-runner
  max_rounds: 1
  wait: 10
  resolve_questions: false

steps:
  - name: bench
    prompt: |
      You are benchmarking the writing-en skill. Read the eval cases from
      home/claude/evals/writing-en/evals.json.

      For each eval case:
      1. Read the "input" field — this is the text to edit.
      2. Record the start time.
      3. Apply all four writing-en passes in order:
         - Pass 1 (Words): fix nominalizations, long words, filler, negatives, dead metaphors
         - Pass 2 (Sentences): actor as subject, active voice, verb within 7 words, split/reconnect
         - Pass 3 (Paragraphs): main point first, one topic per paragraph, informative headings
         - Pass 4 (AI patterns): cut filler openings, replace promotional adjectives, vary sentence length
      4. Record the end time.
      5. Save the edited text to home/claude/evals/writing-en/outputs/{id}.md
         Save ONLY the edited text, no commentary or explanation.
      6. Save timing to home/claude/evals/writing-en/outputs/{id}.meta.json:
         {"elapsed_seconds": <seconds as float>}

      Use the bench skill for measuring elapsed time per case.

      Read the pass reference files for the full rules:
      - home/claude/skills/writing-en/pass-1-words.md
      - home/claude/skills/writing-en/pass-2-sentences.md
      - home/claude/skills/writing-en/pass-3-paragraphs.md
      - home/claude/skills/writing-en/pass-4-ai.md

      Process all 8 eval cases. Create the outputs/ directory if needed.
    accept: |
      - All 8 output files exist in home/claude/evals/writing-en/outputs/
      - All 8 meta.json files exist with elapsed_seconds
      - Each output file contains only the edited text
    skills: [bench]
    verify: |
      cd /workspace && python3 home/claude/evals/writing-en/grade.py
    on_fail: retry
    max_retries: 1
