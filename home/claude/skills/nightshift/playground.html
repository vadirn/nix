<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightshift Pipeline Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; overflow: hidden; }

/* Left panel - YAML editor */
.left { width: 380px; min-width: 380px; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
.left h2 { padding: 12px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; border-bottom: 1px solid #30363d; }
.yaml-editor { flex: 1; background: #161b22; border: none; color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; padding: 12px; resize: none; outline: none; line-height: 1.5; }
.controls { padding: 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 6px 14px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.btn:hover { background: #30363d; border-color: #8b949e; }
.btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn.primary:hover { background: #2ea043; }
.btn.danger { background: #da3633; border-color: #f85149; color: #fff; }
.btn.danger:hover { background: #f85149; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Right panel - simulation */
.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
.right-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; }
.status-bar { font-size: 12px; color: #8b949e; }
.status-bar .step-name { color: #58a6ff; }
.status-bar .turn-num { color: #d2a8ff; }

/* Timeline */
.timeline { flex: 1; overflow-y: auto; padding: 16px; }
.event { margin-bottom: 2px; padding: 10px 14px; border-radius: 6px; font-size: 12px; border-left: 3px solid transparent; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.event.step-start { background: #161b22; border-left-color: #58a6ff; }
.event.turn { background: #161b22; border-left-color: #8b949e; }
.event.checkpoint { background: #0d1117; border-left-color: #d2a8ff; font-family: 'SF Mono', 'Fira Code', monospace; }
.event.complete { background: #0d2818; border-left-color: #3fb950; }
.event.failed { background: #2d1117; border-left-color: #f85149; }
.event.in-progress { background: #2d2000; border-left-color: #d29922; }
.event.resolver { background: #0d1830; border-left-color: #58a6ff; }
.event.verify { background: #1a1030; border-left-color: #bc8cff; }
.event.commit { background: #161b22; border-left-color: #484f58; font-size: 11px; color: #8b949e; }
.event.stop { background: #2d1117; border-left-color: #f85149; font-weight: 600; }
.event.pipeline-done { background: #0d2818; border-left-color: #3fb950; font-weight: 600; }
.event.info { background: #161b22; border-left-color: #484f58; color: #8b949e; }

.event .label { font-weight: 600; margin-bottom: 4px; }
.event .detail { color: #8b949e; margin-top: 4px; line-height: 1.6; }
.event .detail code { background: #21262d; padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
.event .mount { color: #7ee787; }
.event .flag { color: #d2a8ff; }
.event .skill-tag { display: inline-block; background: #1f2937; border: 1px solid #30363d; padding: 1px 6px; border-radius: 3px; margin: 1px 2px; font-size: 10px; }

.frontmatter { background: #21262d; padding: 8px 10px; border-radius: 4px; margin-top: 6px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; line-height: 1.5; white-space: pre; }
.fm-key { color: #ff7b72; }
.fm-val-complete { color: #3fb950; }
.fm-val-progress { color: #d29922; }
.fm-val-failed { color: #f85149; }
.fm-val { color: #79c0ff; }

/* Bottom detail panel */
.detail-panel { border-top: 1px solid #30363d; padding: 12px 16px; max-height: 200px; overflow-y: auto; }
.detail-panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 8px; }
.prompt-preview { background: #161b22; padding: 10px; border-radius: 6px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; line-height: 1.5; color: #8b949e; white-space: pre-wrap; max-height: 140px; overflow-y: auto; }

/* Legend */
.legend { padding: 8px 16px; border-top: 1px solid #30363d; display: flex; gap: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8b949e; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }
.legend-dot.green { background: #3fb950; }
.legend-dot.yellow { background: #d29922; }
.legend-dot.red { background: #f85149; }
.legend-dot.blue { background: #58a6ff; }
.legend-dot.purple { background: #bc8cff; }
.legend-dot.gray { background: #484f58; }
</style>
</head>
<body>

<div class="left">
  <h2>Pipeline YAML</h2>
  <textarea class="yaml-editor" id="yamlEditor" spellcheck="false">name: auth-refactor

defaults:
  model: claude-opus-4-6[1m]
  image: claude-runner
  max_turns: 5
  wait: 30
  resolve_questions: true
  explore_model: claude-haiku-4-5

steps:
  - name: analyze
    prompt: |
      Analyze the auth module.
      Identify every file using session auth.
      Write a migration plan.
    skills:
      - explore
    max_turns: 2

  - name: implement
    prompt: |
      Replace session auth with JWT.
      Start with /api/login end-to-end,
      then expand to remaining endpoints.
    accept: |
      - no session-based auth imports remain
      - tests pass
    skills:
      - tracer-bullet
      - tdd
    agent: api-developer
    image: claude-runner-node
    max_turns: 4

  - name: verify
    prompt: |
      Run full test suite. Fix any failures.
    accept: |
      - test suite passes with exit code 0
    verify: "cd /workspace && npm test"
    skills:
      - tdd
    max_turns: 3
    on_fail: retry
    max_retries: 1</textarea>
  <div class="controls">
    <button class="btn primary" id="btnNext" onclick="nextTurn()">Next Turn</button>
    <button class="btn" id="btnAuto" onclick="toggleAuto()">Auto Run</button>
    <button class="btn danger" id="btnStop" onclick="simulateStop()" disabled>STOP</button>
    <button class="btn" onclick="resetSim()">Reset</button>
  </div>
</div>

<div class="right">
  <div class="right-header">
    <h2>Pipeline Simulation</h2>
    <div class="status-bar" id="statusBar">Ready</div>
  </div>
  <div class="timeline" id="timeline">
    <div class="event info"><div class="label">Waiting to start</div><div class="detail">Edit the pipeline YAML and click <code>Next Turn</code> or <code>Auto Run</code></div></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div> COMPLETE</div>
    <div class="legend-item"><div class="legend-dot yellow"></div> IN_PROGRESS</div>
    <div class="legend-item"><div class="legend-dot red"></div> FAILED</div>
    <div class="legend-item"><div class="legend-dot blue"></div> Resolver</div>
    <div class="legend-item"><div class="legend-dot purple"></div> Verify</div>
    <div class="legend-item"><div class="legend-dot gray"></div> Git commit</div>
  </div>
  <div class="detail-panel">
    <h3>Last Constructed Prompt</h3>
    <div class="prompt-preview" id="promptPreview">No turns executed yet.</div>
  </div>
</div>

<script>
// -- State --
let pipeline = null;
let simState = null;
let autoRunning = false;
let autoTimer = null;
let stopped = false;

function parseYAML(text) {
  // Minimal YAML parser for our pipeline schema
  const lines = text.split('\n');
  const result = { defaults: {}, steps: [] };
  let currentStep = null;
  let inDefaults = false;
  let inSteps = false;
  let inList = null; // 'skills' etc
  let multilineKey = null;
  let multilineVal = '';

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;

    // Top level
    if (line.match(/^name:\s*(.+)/)) {
      result.name = line.match(/^name:\s*(.+)/)[1].trim();
      continue;
    }
    if (line === 'defaults:') { inDefaults = true; inSteps = false; currentStep = null; continue; }
    if (line === 'steps:') { inSteps = true; inDefaults = false; continue; }

    if (inDefaults && line.match(/^\s{2}\w/)) {
      const m = trimmed.match(/^(\w+):\s*(.+)/);
      if (m) {
        let val = m[2].trim();
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        else if (!isNaN(val) && val !== '') val = Number(val);
        result.defaults[m[1]] = val;
      }
      continue;
    }

    if (inSteps) {
      if (line.match(/^\s{2}-\s+name:/)) {
        const name = line.match(/name:\s*(.+)/)[1].trim();
        currentStep = { name, prompt: '', accept: '', skills: [], agent: '', image: '', model: '', max_turns: 0, on_fail: 'stop', max_retries: 0, verify: '', resolve_questions: true };
        result.steps.push(currentStep);
        inList = null;
        multilineKey = null;
        continue;
      }
      if (currentStep && trimmed.match(/^\w+:/)) {
        if (multilineKey) { currentStep[multilineKey] = multilineVal.trim(); multilineKey = null; multilineVal = ''; }
        const m = trimmed.match(/^(\w[\w_]*):\s*(.*)/);
        if (m) {
          const key = m[1];
          let val = m[2].trim();
          if (val === '|') { multilineKey = key; multilineVal = ''; inList = null; continue; }
          if (val === '') { inList = key; continue; }
          if (key === 'skills' || key === 'depends_on') { inList = key; if (val.startsWith('[')) { currentStep[key] = val.replace(/[\[\]]/g,'').split(',').map(s=>s.trim()); } continue; }
          if (val === 'true') val = true;
          else if (val === 'false') val = false;
          else if (!isNaN(val) && val !== '') val = Number(val);
          else val = val.replace(/^["']|["']$/g, '');
          currentStep[key] = val;
          inList = null;
        }
        continue;
      }
      if (multilineKey && trimmed) {
        multilineVal += trimmed + '\n';
        continue;
      }
      if (inList && trimmed.startsWith('- ')) {
        if (!Array.isArray(currentStep[inList])) currentStep[inList] = [];
        currentStep[inList].push(trimmed.slice(2).trim());
        continue;
      }
    }
  }
  if (multilineKey && currentStep) currentStep[multilineKey] = multilineVal.trim();

  // Apply defaults
  const defs = { model: 'claude-opus-4-6[1m]', image: 'claude-runner', max_turns: 50, wait: 30, resolve_questions: true, explore_model: 'claude-haiku-4-5', ...result.defaults };
  result.defaults = defs;
  for (const s of result.steps) {
    if (!s.model) s.model = defs.model;
    if (!s.image) s.image = defs.image;
    if (!s.max_turns) s.max_turns = defs.max_turns;
    if (s.resolve_questions === true && defs.resolve_questions === false) s.resolve_questions = false;
  }
  return result;
}

function initSim() {
  const yaml = document.getElementById('yamlEditor').value;
  try {
    pipeline = parseYAML(yaml);
  } catch(e) {
    addEvent('failed', 'Parse Error', e.message);
    return false;
  }
  if (!pipeline.steps.length) { addEvent('failed', 'No Steps', 'Pipeline has no steps defined'); return false; }
  simState = { stepIdx: 0, turnIdx: 0, retries: 0, checkpoints: [], done: false, prevCheckpointContent: null };
  stopped = false;
  document.getElementById('btnStop').disabled = false;
  return true;
}

function resetSim() {
  stopAuto();
  pipeline = null;
  simState = null;
  stopped = false;
  document.getElementById('timeline').innerHTML = '<div class="event info"><div class="label">Waiting to start</div><div class="detail">Edit the pipeline YAML and click <code>Next Turn</code> or <code>Auto Run</code></div></div>';
  document.getElementById('statusBar').textContent = 'Ready';
  document.getElementById('promptPreview').textContent = 'No turns executed yet.';
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnNext').disabled = false;
}

function addEvent(type, label, detail) {
  const tl = document.getElementById('timeline');
  const div = document.createElement('div');
  div.className = 'event ' + type;
  div.innerHTML = '<div class="label">' + label + '</div>' + (detail ? '<div class="detail">' + detail + '</div>' : '');
  tl.appendChild(div);
  tl.scrollTop = tl.scrollHeight;
}

function makeTimestamp() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
}

function renderFrontmatter(status, step, turn) {
  const statusClass = status === 'STEP_COMPLETE' ? 'fm-val-complete' : status === 'STEP_FAILED' ? 'fm-val-failed' : 'fm-val-progress';
  return `<div class="frontmatter"><span class="fm-key">---</span>\n<span class="fm-key">status:</span> <span class="${statusClass}">${status}</span>\n<span class="fm-key">step:</span> <span class="fm-val">${step}</span>\n<span class="fm-key">turn:</span> <span class="fm-val">${turn}</span>\n<span class="fm-key">---</span></div>`;
}

function simulateCheckpointStatus(step, turnInStep) {
  // Simulate realistic progression
  if (turnInStep >= step.max_turns) return 'STEP_FAILED';

  // First turn: usually in progress
  if (turnInStep === 1) return Math.random() < 0.15 ? 'STEP_COMPLETE' : 'STEP_IN_PROGRESS';

  // Middle turns: growing chance of completion
  const completeChance = 0.3 + (turnInStep / step.max_turns) * 0.5;
  const r = Math.random();
  if (r < completeChance) return 'STEP_COMPLETE';
  if (r < completeChance + 0.08) return 'STEP_FAILED';
  return 'STEP_IN_PROGRESS';
}

function simulateHasQuestions(turnInStep) {
  // ~30% chance of open questions on first turns, decreasing
  return Math.random() < (0.35 / turnInStep);
}

function nextTurn() {
  if (!simState) {
    document.getElementById('timeline').innerHTML = '';
    if (!initSim()) return;
    addEvent('info', `Pipeline: ${pipeline.name}`, `${pipeline.steps.length} steps, model: <code>${pipeline.defaults.model}</code>`);
  }

  if (simState.done || stopped) return;

  const step = pipeline.steps[simState.stepIdx];
  if (!step) { finishPipeline(); return; }

  // Step start
  if (simState.turnIdx === 0) {
    const skillsHtml = ['checkpoint', ...step.skills].map(s => `<span class="skill-tag">${s}</span>`).join(' ');
    let imgNote = step.image !== 'claude-runner' ? ` (image: <code>${step.image}</code>)` : '';
    addEvent('step-start', `Step ${simState.stepIdx + 1}/${pipeline.steps.length}: ${step.name}`,
      `max_turns: ${step.max_turns}, on_fail: ${step.on_fail}${step.verify ? ', verify: <code>' + step.verify + '</code>' : ''}${imgNote}<br>Skills: ${skillsHtml}`);
  }

  simState.turnIdx++;
  const seq = simState.turnIdx;
  const ts = makeTimestamp();
  const cpName = `checkpoint-${step.name}-${String(seq).padStart(3,'0')}-${ts}.md`;

  // Show turn start with docker mounts
  const mounts = [
    `<span class="mount">workspace</span> → /workspace`,
    `<span class="mount">.git:ro</span> → /workspace/.git`,
    `<span class="mount">skills/{checkpoint${step.skills.length ? ',' + step.skills.join(',') : ''}}</span> → /workspace/.claude/skills:ro`,
  ];
  if (step.agent) mounts.push(`<span class="mount">agents/</span> → /workspace/.claude/agents:ro`);

  const flags = [
    `<span class="flag">-p</span> "..."`,
    `<span class="flag">--model</span> ${step.model}`,
    `<span class="flag">--max-turns</span> ${step.max_turns}`,
    `<span class="flag">--dangerously-skip-permissions</span>`,
  ];
  if (step.agent) flags.push(`<span class="flag">--agent</span> ${step.agent}`);

  addEvent('turn', `Turn ${seq}/${step.max_turns} → <code>nightshift-${step.name}-${seq}</code>`,
    `Docker mounts: ${mounts.join(', ')}<br>Flags: ${flags.join(' ')}`);

  // Update status bar
  document.getElementById('statusBar').innerHTML = `Step: <span class="step-name">${step.name}</span> | Turn: <span class="turn-num">${seq}/${step.max_turns}</span>`;

  // Build and show prompt
  const prompt = buildPrompt(step, seq, simState.prevCheckpointContent, cpName);
  document.getElementById('promptPreview').textContent = prompt;

  // Simulate checkpoint result
  const status = simulateCheckpointStatus(step, seq);
  const statusType = status === 'STEP_COMPLETE' ? 'complete' : status === 'STEP_FAILED' ? 'failed' : 'in-progress';
  const hasQuestions = status === 'STEP_IN_PROGRESS' && step.resolve_questions !== false && simulateHasQuestions(seq);

  const sections = [];
  if (status === 'STEP_COMPLETE') sections.push('## Done\nAll acceptance criteria met.');
  else if (status === 'STEP_FAILED') sections.push('## Frictions\nBlocked: cannot resolve dependency.');
  else sections.push('## Done\nPartial progress.\n\n## Next\n- Continue implementation.');
  if (hasQuestions) sections.push('## Open questions\n- What rate limit does the external API enforce?');

  addEvent('checkpoint', `${cpName}`, renderFrontmatter(status, step.name, seq));

  // Git commit
  addEvent('commit', `git add -A -- ':!.nightshift' && git commit -m "nightshift: ${ts}"`, '');

  // Verify (if configured and status is COMPLETE)
  let finalStatus = status;
  if (step.verify && status === 'STEP_COMPLETE') {
    const verifyPass = Math.random() < 0.7;
    if (verifyPass) {
      addEvent('verify', `Verify passed`, `<code>docker run --rm ${step.image} sh -c "${step.verify}"</code> → exit 0`);
    } else {
      addEvent('verify', `Verify FAILED → overriding to IN_PROGRESS`, `<code>${step.verify}</code> → exit 1`);
      finalStatus = 'STEP_IN_PROGRESS';
    }
  }

  // Resolver
  if (finalStatus === 'STEP_IN_PROGRESS' && hasQuestions) {
    addEvent('resolver', `Resolver agent (${pipeline.defaults.explore_model})`,
      `Reading <code>${cpName}</code> → searching codebase + firecrawl → appending ## Answers`);
  }

  // Save checkpoint content for next turn
  simState.prevCheckpointContent = `---\nstatus: ${finalStatus}\nstep: ${step.name}\nturn: ${seq}\n---\n\n${sections.join('\n\n')}`;
  simState.checkpoints.push({ name: cpName, status: finalStatus, step: step.name });

  // Handle status transitions
  if (finalStatus === 'STEP_COMPLETE') {
    addEvent('complete', `Step "${step.name}" complete`, '');
    simState.stepIdx++;
    simState.turnIdx = 0;
    simState.retries = 0;
    simState.prevCheckpointContent = simState.prevCheckpointContent; // carry to next step
    if (simState.stepIdx >= pipeline.steps.length) { finishPipeline(); return; }
  } else if (finalStatus === 'STEP_FAILED') {
    if (step.on_fail === 'retry' && simState.retries < (step.max_retries || 0)) {
      simState.retries++;
      addEvent('in-progress', `Retrying (${simState.retries}/${step.max_retries})`, '');
    } else {
      addEvent('failed', `Pipeline aborted at step "${step.name}"`, step.on_fail === 'stop' ? 'on_fail: stop' : `Max retries (${step.max_retries}) exceeded`);
      simState.done = true;
      stopAuto();
      document.getElementById('btnNext').disabled = true;
      return;
    }
  } else {
    // IN_PROGRESS - check if we hit max turns
    if (seq >= step.max_turns) {
      addEvent('failed', `Step "${step.name}" reached max turns (${step.max_turns})`, '');
      simState.done = true;
      stopAuto();
      document.getElementById('btnNext').disabled = true;
      return;
    }
  }

  // Check STOP file
  if (stopped) {
    addEvent('stop', 'STOP file detected', 'Stopping after current turn');
    simState.done = true;
    stopAuto();
    document.getElementById('btnNext').disabled = true;
  }
}

function finishPipeline() {
  addEvent('pipeline-done', `Pipeline "${pipeline.name}" complete`, `${simState.checkpoints.length} checkpoints generated across ${pipeline.steps.length} steps`);
  simState.done = true;
  stopAuto();
  document.getElementById('btnNext').disabled = true;
  document.getElementById('statusBar').textContent = 'Pipeline complete';
}

function buildPrompt(step, turnNumber, prevCheckpoint, cpFilename) {
  return `You are running as an autonomous agent.
Step: "${step.name}", turn ${turnNumber}.

## Task
${step.prompt}

## Acceptance Criteria
${step.accept || 'Complete the task described above.'}

## Previous Checkpoint
${prevCheckpoint || 'First turn. No prior state.'}

## Instructions
- Read the codebase using git log, git diff, git status, and file reads.
- Write your checkpoint to .nightshift/${cpFilename} before finishing.
- Set status to STEP_COMPLETE when all acceptance criteria are met.
- Set status to STEP_IN_PROGRESS with clear ## Next items when work remains.
- Set status to STEP_FAILED when the task is blocked and cannot proceed.
- Record unknowns in ## Open questions.
- The orchestrator handles git commits. Focus on code changes and checkpoint.
- Work autonomously.`;
}

function simulateStop() {
  stopped = true;
  document.getElementById('btnStop').disabled = true;
  if (!simState || simState.done) {
    addEvent('stop', 'STOP file created', 'Will stop after current turn');
  }
}

function toggleAuto() {
  if (autoRunning) { stopAuto(); }
  else { startAuto(); }
}

function startAuto() {
  autoRunning = true;
  document.getElementById('btnAuto').textContent = 'Pause';
  document.getElementById('btnAuto').classList.add('danger');
  runAutoStep();
}

function stopAuto() {
  autoRunning = false;
  clearTimeout(autoTimer);
  document.getElementById('btnAuto').textContent = 'Auto Run';
  document.getElementById('btnAuto').classList.remove('danger');
}

function runAutoStep() {
  if (!autoRunning) return;
  nextTurn();
  if (simState && !simState.done && !stopped) {
    autoTimer = setTimeout(runAutoStep, 800);
  } else {
    stopAuto();
  }
}
</script>
</body>
</html>
