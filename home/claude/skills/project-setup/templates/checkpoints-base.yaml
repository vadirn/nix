filters:
  and:
    - type == "checkpoint"
    - file.inFolder("<path>")
properties:
  file.name:
    displayName: Checkpoint
  note.description:
    displayName: Description
  note.done:
    displayName: Done
  note.decisions:
    displayName: Decisions
  note.frictions:
    displayName: Frictions
views:
  - type: table
    name: All
    order:
      - file.name
      - description
      - done
      - decisions
      - frictions
    sort:
      - property: file.name
        direction: DESC
  - type: table
    name: Incomplete
    filters:
      and:
        - done == false
    order:
      - file.name
      - description
      - decisions
      - frictions
    sort:
      - property: file.name
        direction: DESC
  - type: table
    name: Done
    filters:
      and:
        - done == true
    order:
      - file.name
      - description
      - decisions
      - frictions
    sort:
      - property: file.name
        direction: DESC
  - type: table
    name: Graduation queue
    filters:
      or:
        - decisions.length > 0
        - frictions.length > 0
    order:
      - file.name
      - description
      - done
      - decisions
      - frictions
    sort:
      - property: file.name
        direction: DESC
